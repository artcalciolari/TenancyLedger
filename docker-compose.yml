name: tenancy-ledger

x-app-environment: &app-environment
  NODE_ENV: development
  PORT: 3000
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
  SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DB_HOST: db
  DB_PORT: 5432
  DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
  DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
  DB_DATABASE: ${DB_DATABASE:?DB_DATABASE is required}
  DB_SSL: ${DB_SSL:-false}
  DB_SSL_CA_FILE: ${DB_SSL_CA_FILE:-}
  DB_SSL_CERT_FILE: ${DB_SSL_CERT_FILE:-}
  DB_SSL_KEY_FILE: ${DB_SSL_KEY_FILE:-}
  DB_LOGGING: ${DB_LOGGING:-false}
  MINIO_ENDPOINT: minio
  MINIO_PORT: 9000
  MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
  MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:?MINIO_BUCKET_NAME is required}
  MINIO_USE_SSL: 'false'
  MINIO_AUTO_CREATE_BUCKET: ${MINIO_AUTO_CREATE_BUCKET:-true}
  STORAGE_SSE_ENABLED: ${STORAGE_SSE_ENABLED:-false}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
  JWT_ISSUER: ${JWT_ISSUER:-tenancy-ledger}
  JWT_AUDIENCE: ${JWT_AUDIENCE:-tenancy-ledger-api}
  AUTH_BOOTSTRAP_EMAIL: ${AUTH_BOOTSTRAP_EMAIL:?AUTH_BOOTSTRAP_EMAIL is required}
  AUTH_BOOTSTRAP_PASSWORD: ${AUTH_BOOTSTRAP_PASSWORD:?AUTH_BOOTSTRAP_PASSWORD is required}
  THROTTLE_TTL_MS: ${THROTTLE_TTL_MS:-60000}
  THROTTLE_LIMIT: ${THROTTLE_LIMIT:-100}
  METRICS_TOKEN: ${METRICS_TOKEN:-development-metrics-token}
  INVOICE_CRON_ENABLED: ${INVOICE_CRON_ENABLED:-true}
  INVOICE_CRON_TIME_ZONE: ${INVOICE_CRON_TIME_ZONE:-America/Sao_Paulo}
  INVOICE_GENERATION_DAYS_AHEAD: ${INVOICE_GENERATION_DAYS_AHEAD:-7}

services:
  app:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    ports:
      - '127.0.0.1:${PORT:-3000}:3000'
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment: *app-environment
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health/ready').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

  migrate:
    build:
      context: .
      target: builder
    command: ['npm', 'run', 'migration:run']
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_DATABASE: ${DB_DATABASE:?DB_DATABASE is required}
      DB_SSL: ${DB_SSL:-false}
      DB_SSL_CA_FILE: ${DB_SSL_CA_FILE:-}
      DB_SSL_CERT_FILE: ${DB_SSL_CERT_FILE:-}
      DB_SSL_KEY_FILE: ${DB_SSL_KEY_FILE:-}
      DB_LOGGING: ${DB_LOGGING:-false}
    restart: 'no'

  db:
    image: postgres:18.3-alpine3.22@sha256:af27ebd3413839ccfdcdf88e91ca76ad82117e52192067b76de9bb5be7ea6e04
    restart: unless-stopped
    ports:
      - '127.0.0.1:${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - '127.0.0.1:${MINIO_PORT:-9000}:9000'
      - '127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    healthcheck:
      test: ['CMD', 'curl', '--fail', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
