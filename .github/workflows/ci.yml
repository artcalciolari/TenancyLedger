name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-quality:
    name: Backend quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        working-directory: ${{ github.workspace }}
        run: npm ci

      - name: Check backend production dependencies
        working-directory: ${{ github.workspace }}
        run: npm audit --workspace backend --omit=dev --audit-level=high

      - name: Check backend formatting
        run: npm run format:check

      - name: Lint backend
        run: npm run lint:check

      - name: Type-check backend
        run: npm run typecheck

      - name: Run backend unit tests
        run: npm run test:ci

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/coverage/
            backend/test/coverage/
          if-no-files-found: warn
          retention-days: 14

  backend-integration-image:
    name: Backend integration and image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: backend-quality
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:18.3-alpine3.22@sha256:af27ebd3413839ccfdcdf88e91ca76ad82117e52192067b76de9bb5be7ea6e04
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tenancyledger_test
        options: >-
          --health-cmd "pg_isready -U postgres -d tenancyledger_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      PORT: 3000
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: tenancyledger_test
      MINIO_ENDPOINT: localhost
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: payment-proofs-test
      MINIO_USE_SSL: 'false'
      MINIO_AUTO_CREATE_BUCKET: 'true'
      STORAGE_SSE_ENABLED: 'false'
      JWT_SECRET: ci-only-jwt-secret-with-at-least-32-characters
      JWT_EXPIRES_IN: 15m
      JWT_ISSUER: tenancy-ledger-ci
      JWT_AUDIENCE: tenancy-ledger-api-ci
      AUTH_BOOTSTRAP_EMAIL: admin@example.com
      AUTH_BOOTSTRAP_PASSWORD: Strong-ci-password-123!

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        working-directory: ${{ github.workspace }}
        run: npm ci

      - name: Start MinIO
        run: |
          docker run --detach --name minio-ci \
            --publish 9000:9000 \
            --env MINIO_ROOT_USER="$MINIO_ACCESS_KEY" \
            --env MINIO_ROOT_PASSWORD="$MINIO_SECRET_KEY" \
            --health-cmd "curl --fail http://localhost:9000/minio/health/live" \
            --health-interval 2s \
            --health-timeout 5s \
            --health-retries 15 \
            minio/minio:RELEASE.2025-04-22T22-12-26Z@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e \
            server /data

          for attempt in {1..30}; do
            status="$(docker inspect --format '{{.State.Health.Status}}' minio-ci)"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            sleep 2
          done

          if docker ps -a --format '{{.Names}}' | grep -q '^minio-ci$'; then
            docker logs minio-ci
          fi
          exit 1

      - name: Create test object-storage bucket
        run: >-
          node -e "const { S3Client, CreateBucketCommand } = require('@aws-sdk/client-s3');
          const client = new S3Client({ endpoint: 'http://localhost:9000', region: 'us-east-1',
          forcePathStyle: true, credentials: { accessKeyId: process.env.MINIO_ACCESS_KEY,
          secretAccessKey: process.env.MINIO_SECRET_KEY } });
          client.send(new CreateBucketCommand({ Bucket: process.env.MINIO_BUCKET_NAME }))
          .catch((error) => { console.error(error); process.exit(1); });"

      - name: Apply database migrations
        run: npm run migration:run

      - name: Run backend end-to-end tests
        run: npm run test:e2e:ci

      - name: Build backend
        run: npm run build

      - name: Build backend production image
        run: docker build --tag tenancy-ledger-api:ci .

      - name: Verify compiled migrations in the runtime image
        run: |
          docker run --rm --network host \
            --env NODE_ENV=test \
            --env DB_HOST=127.0.0.1 \
            --env DB_PORT --env DB_USERNAME --env DB_PASSWORD --env DB_DATABASE \
            tenancy-ledger-api:ci npm run migration:show:prod

      - name: Smoke-test the backend production image
        run: |
          docker run --detach --name tenancy-ledger-api-ci --network host \
            --env NODE_ENV=test --env PORT=3001 \
            --env DB_HOST=127.0.0.1 \
            --env DB_PORT --env DB_USERNAME --env DB_PASSWORD --env DB_DATABASE \
            --env JWT_SECRET --env JWT_EXPIRES_IN --env JWT_ISSUER --env JWT_AUDIENCE \
            --env AUTH_BOOTSTRAP_EMAIL --env AUTH_BOOTSTRAP_PASSWORD \
            --env MINIO_ENDPOINT=127.0.0.1 \
            --env MINIO_PORT --env MINIO_ACCESS_KEY --env MINIO_SECRET_KEY \
            --env MINIO_BUCKET_NAME --env MINIO_USE_SSL --env STORAGE_SSE_ENABLED \
            --env THROTTLE_TTL_MS=60000 --env THROTTLE_LIMIT=100 \
            --env INVOICE_CRON_ENABLED=false \
            tenancy-ledger-api:ci

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3001/health/ready; then
              exit 0
            fi
            sleep 2
          done

          if docker ps -a --format '{{.Names}}' | grep -q '^tenancy-ledger-api-ci$'; then
            docker logs tenancy-ledger-api-ci
          fi
          exit 1

      - name: Verify the runtime OpenAPI snapshot
        env:
          OPENAPI_URL: http://127.0.0.1:3001/docs-json
        run: npm run openapi:check

      - name: Stop runtime smoke-test container
        if: always()
        run: |
          if docker ps -a --format '{{.Names}}' | grep -q '^tenancy-ledger-api-ci$'; then
            docker rm --force tenancy-ledger-api-ci
          fi

      - name: Show MinIO logs on failure
        if: failure()
        run: |
          if docker ps -a --format '{{.Names}}' | grep -q '^minio-ci$'; then
            docker logs minio-ci
          fi

  frontend:
    name: Frontend quality, tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        working-directory: ${{ github.workspace }}
        run: npm ci

      - name: Check frontend production dependencies
        working-directory: ${{ github.workspace }}
        run: npm audit --workspace frontend --omit=dev --audit-level=high

      - name: Verify generated OpenAPI types
        run: npm run api:check

      - name: Check frontend formatting
        run: npm run format:check

      - name: Lint frontend
        run: npm run lint:check

      - name: Type-check frontend
        run: npm run typecheck

      - name: Run frontend unit and component tests
        run: npm run test:ci

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: warn
          retention-days: 14

      - name: Build frontend
        run: npm run build

      - name: Build frontend production image
        working-directory: ${{ github.workspace }}
        run: docker build --file frontend/Dockerfile --tag tenancy-ledger-frontend:ci .

      - name: Smoke-test frontend production image
        run: |
          docker run --detach --name tenancy-ledger-frontend-ci --add-host app:127.0.0.1 --publish 8080:8080 tenancy-ledger-frontend:ci
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8080/healthz; then
              exit 0
            fi
            sleep 1
          done
          docker logs tenancy-ledger-frontend-ci
          exit 1

      - name: Stop frontend smoke-test container
        if: always()
        run: docker rm --force tenancy-ledger-frontend-ci || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run frontend end-to-end tests
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: warn
          retention-days: 14